<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lihtsalt Tehtud</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body>
		<header
			id="header"
			class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 md:px-32 py-3 border-b border-black/5 bg-white/80 backdrop-blur-md transition-shadow duration-300"
		>
			<a href="/" class="flex items-center gap-2 text-lg font-semibold">
				<img src="assets/logo-icon.svg" alt="Lihtsalt Tehtud" class="w-6 h-6" />
				Lihtsalt Tehtud
			</a>

			<!-- Desktop  -->
			<nav
				class="hidden md:flex items-center gap-6 text-black/50 font-semibold"
			>
				<a href="/mtu" class="text-sm hover:text-black transition-colors"
					>MTÜ</a
				>
				<a href="/kov" class="text-sm hover:text-black transition-colors"
					>KOV</a
				>
				<a href="/ettevote" class="text-sm hover:text-black transition-colors"
					>Ettevõte</a
				>
				<a
					href="#kontakt"
					class="text-sm font-semibold text-black bg-[#D6F2E8] hover:bg-[#c3e8d9] px-3.5 py-1 rounded-full transition-colors"
					>Kontakt</a
				>
			</nav>

			<!-- Mobile -->
			<button id="menu-toggle" class="md:hidden p-1" aria-label="Toggle menu">
				<svg
					id="menu-icon"
					xmlns="http://www.w3.org/2000/svg"
					class="w-5 h-5"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<line x1="4" y1="6" x2="20" y2="6" />
					<line x1="4" y1="12" x2="20" y2="12" />
					<line x1="4" y1="18" x2="20" y2="18" />
				</svg>
				<svg
					id="close-icon"
					xmlns="http://www.w3.org/2000/svg"
					class="w-5 h-5 hidden"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<line x1="18" y1="6" x2="6" y2="18" />
					<line x1="6" y1="6" x2="18" y2="18" />
				</svg>
			</button>
		</header>

		<div
			id="mobile-menu"
			class="fixed inset-0 z-40 bg-white flex flex-col items-center justify-center gap-8 translate-x-full transition-transform duration-300 md:hidden"
		>
			<a href="/mtu" class="text-2xl font-semibold text-black">MTÜ</a>
			<a href="/kov" class="text-2xl font-semibold text-black">KOV</a>
			<a href="/ettevote" class="text-2xl font-semibold text-black">Ettevõte</a>
			<a href="/kontakt" class="text-2xl font-semibold text-black">Kontakt</a>
		</div>

		<section></section>

		<footer></footer>

		<script>
			const toggle = document.getElementById("menu-toggle");
			const menu = document.getElementById("mobile-menu");
			const menuIcon = document.getElementById("menu-icon");
			const closeIcon = document.getElementById("close-icon");
			let open = false;

			toggle.addEventListener("click", () => {
				open = !open;
				menu.classList.toggle("translate-x-full", !open);
				menu.classList.toggle("translate-x-0", open);
				menuIcon.classList.toggle("hidden", open);
				closeIcon.classList.toggle("hidden", !open);
				document.body.style.overflow = open ? "hidden" : "";
			});

			menu
				.querySelectorAll("a")
				.forEach((a) => a.addEventListener("click", () => toggle.click()));

			window.addEventListener("scroll", () => {
				const h = document.getElementById("header");
				h.classList.toggle("shadow-sm", window.scrollY > 4);
			});
		</script>
	</body>
</html>
